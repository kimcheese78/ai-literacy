  <p class="myth"><span class="mr-tag myth-tag">Myth</span> AI is mainly a tool for programmers.</p>
  <p class="reality"><span class="mr-tag reality-tag">Reality</span> Coding is only about <strong>4%</strong> of real usage. By volume, AI is overwhelmingly a <em>words</em> tool — reading, writing, explaining.</p>
